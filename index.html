<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Juice Farm — Forest Edition</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{background:#2d5a1b;display:flex;flex-direction:column;align-items:center;font-family:Arial,sans-serif}
    #wrap{width:900px;margin:6px auto}
    canvas{border:3px solid #1a3a0a;border-radius:10px;display:block}
    #hud{background:rgba(10,25,5,0.88);color:white;padding:7px 12px;border-radius:0 0 8px 8px;font-size:13px;display:flex;gap:12px;flex-wrap:wrap;align-items:center}
    #ctrl{background:rgba(255,255,255,0.8);border-radius:6px;padding:4px 12px;font-size:11px;color:#333;margin-top:3px;text-align:center}
  </style>
</head>
<body>
<div id="wrap">
  <canvas id="game" width="900" height="560"></canvas>
  <div id="hud"></div>
  <div id="ctrl">Arrow keys = move &nbsp;|&nbsp; SPACE = harvest / put in basket / mix / serve &nbsp;|&nbsp; B = drop basket contents into mixer</div>
</div>
<script>
const C=document.getElementById('game'),ctx=C.getContext('2d'),hud=document.getElementById('hud');
const W=C.width,H=C.height;
const GROUND_Y=340;

const FRUITS={
  orange:   {color:'#FF8C00',lite:'#FFD580',dark:'#B36000',juice:'#FF9900',need:2,pay:12,emoji:'🍊'},
  apple:    {color:'#CC2222',lite:'#FF8888',dark:'#881111',juice:'#FF5533',need:2,pay:10,emoji:'🍎'},
  pineapple:{color:'#DDBB00',lite:'#FFE87A',dark:'#997700',juice:'#FFE033',need:3,pay:18,emoji:'🍍'},
  grape:    {color:'#7722CC',lite:'#CC88FF',dark:'#440088',juice:'#AA44FF',need:4,pay:22,emoji:'🍇'},
  mango:    {color:'#FF6600',lite:'#FFB366',dark:'#994400',juice:'#FFAA00',need:2,pay:14,emoji:'🥭'},
  lemon:    {color:'#CCDD00',lite:'#EEFF99',dark:'#777700',juice:'#EEFF33',need:1,pay:8, emoji:'🍋'}
};
const FK=Object.keys(FRUITS);
let money=0,tick=0,keys={},particles=[],floaters=[];
let actionCD=0;

// PANIER (basket) — carried by player, holds harvested fruits before mixing
let panier={contents:{},maxSlots:8,anim:0,bounce:0};
FK.forEach(f=>panier.contents[f]=0);
function panierTotal(){return FK.reduce((s,f)=>s+panier.contents[f],0);}
function panierFull(){return panierTotal()>=panier.maxSlots;}

let mixer={x:810,y:300,w:72,h:96,mixing:false,mixTick:0,mixColor:'#fff',mixProgress:0,bubbles:[],shake:0};
let player={x:450,y:420,spd:3,hold:null,walkF:0,walkT:0,dir:1,footPhase:0,blink:0,blinkTimer:70};

let trees=[
  {x:60,  fruit:'orange',   inv:0,regrow:0,sway:0,swayDir:1,  size:1.1},
  {x:145, fruit:'apple',    inv:0,regrow:0,sway:0,swayDir:-1, size:1.3},
  {x:240, fruit:'pineapple',inv:0,regrow:0,sway:0,swayDir:1,  size:0.95},
  {x:340, fruit:'grape',    inv:0,regrow:0,sway:0,swayDir:-1, size:1.2},
  {x:440, fruit:'mango',    inv:0,regrow:0,sway:0,swayDir:1,  size:1.0},
  {x:540, fruit:'lemon',    inv:0,regrow:0,sway:0,swayDir:-1, size:1.15},
  {x:630, fruit:'orange',   inv:0,regrow:0,sway:0,swayDir:1,  size:0.9},
  {x:715, fruit:'apple',    inv:0,regrow:0,sway:0,swayDir:-1, size:1.25},
];
trees.forEach(t=>{t.inv=FRUITS[t.fruit].need;});

const bgTrees=[
  {x:30, y:200,s:0.7,col:'#1a4a10'},{x:100,y:185,s:0.55,col:'#1e5514'},
  {x:190,y:195,s:0.65,col:'#164210'},{x:290,y:188,s:0.6, col:'#1c5010'},
  {x:390,y:192,s:0.7, col:'#1a4a10'},{x:480,y:183,s:0.58,col:'#1e5514'},
  {x:570,y:196,s:0.62,col:'#164210'},{x:660,y:188,s:0.75,col:'#1c5010'},
  {x:750,y:192,s:0.65,col:'#1a4a10'},{x:840,y:185,s:0.7, col:'#1e5514'},
  {x:55, y:218,s:0.5, col:'#22601a'},{x:165,y:210,s:0.52,col:'#1e5814'},
  {x:265,y:215,s:0.48,col:'#205c18'},{x:365,y:208,s:0.55,col:'#1a5010'},
  {x:465,y:212,s:0.5, col:'#22601a'},{x:555,y:210,s:0.53,col:'#1e5814'},
  {x:645,y:215,s:0.5, col:'#205c18'},{x:735,y:208,s:0.56,col:'#1a5010'},
  {x:820,y:212,s:0.52,col:'#22601a'},{x:875,y:218,s:0.48,col:'#1e5814'},
];

let inv={};FK.forEach(f=>inv[f]=0);
let customers=[],custTimer=0;

document.addEventListener('keydown',e=>{
  keys[e.key]=true;
  if(e.key===' ')e.preventDefault();
  if(e.key==='b'||e.key==='B'){e.preventDefault();transferPanierToMixer();}
});
document.addEventListener('keyup',e=>{keys[e.key]=false;});

function dist(a,b){return Math.hypot(a.x-b.x,a.y-b.y);}
function addFloat(x,y,txt,color){floaters.push({x,y,txt,color,life:1.2,vy:-1.4});}
function addPop(x,y,color,n=10){
  for(let i=0;i<n;i++){
    let a=Math.random()*Math.PI*2,spd=2+Math.random()*4;
    particles.push({x,y,vx:Math.cos(a)*spd,vy:Math.sin(a)*spd-1.5,r:3+Math.random()*5,life:1,color,gravity:0.13});
  }
}
function addSparkle(x,y,color){
  for(let i=0;i<6;i++){
    let a=(i/6)*Math.PI*2;
    particles.push({x,y,vx:Math.cos(a)*3.5,vy:Math.sin(a)*3.5,r:3,life:1,color,type:'star',rot:a,gravity:0});
  }
}
function lighten(hex,amt){
  let r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return '#'+[Math.min(255,r+amt),Math.min(255,g+amt),Math.min(255,b+amt)].map(v=>v.toString(16).padStart(2,'0')).join('');
}

// Transfer panier contents to mixer inventory
function transferPanierToMixer(){
  let dc=dist(player,{x:mixer.x+mixer.w/2,y:mixer.y+mixer.h/2});
  if(dc>130)return;
  let transferred=false;
  FK.forEach(f=>{
    if(panier.contents[f]>0){
      inv[f]+=panier.contents[f];
      panier.contents[f]=0;
      transferred=true;
    }
  });
  if(transferred){
    addPop(mixer.x+mixer.w/2,mixer.y,mixer.mixColor||'#88DDFF',12);
    addFloat(mixer.x+mixer.w/2,mixer.y-20,'🧺 → Mixer!','#FFE066');
    panier.bounce=12;
  }
}

function spawnCustomer(){
  let want=FK[Math.floor(Math.random()*FK.length)];
  return{x:-70,y:430+Math.random()*80,want,status:'walking',patience:13+Math.random()*10,
    timer:0,speed:1.2+Math.random()*0.9,bob:Math.random()*Math.PI*2,happyT:0,
    arriveX:200+Math.random()*250,hue:Math.floor(Math.random()*360),scale:0.9+Math.random()*0.2};
}

function handleAction(){
  if(actionCD>0)return;actionCD=16;
  // Harvest into panier
  let harvested=false;
  trees.forEach(t=>{
    if(dist(player,{x:t.x,y:GROUND_Y})<90&&t.inv>0){
      if(panierFull()){
        addFloat(t.x,GROUND_Y-110,'🧺 Full!','#FF6655');
        return;
      }
      let f=FRUITS[t.fruit];
      let canTake=Math.min(t.inv, panier.maxSlots-panierTotal());
      panier.contents[t.fruit]+=canTake;
      addPop(t.x,GROUND_Y-80,f.color,14);addSparkle(t.x,GROUND_Y-80,f.lite);
      addFloat(t.x,GROUND_Y-110,'+'+canTake+' '+f.emoji+' 🧺',f.color);
      panier.bounce=10;panier.anim=1;
      t.inv-=canTake;if(t.inv<=0){t.inv=0;t.regrow=Date.now()+6000;t.sway=10;}
      harvested=true;
    }
  });
  if(harvested)return;

  // At mixer: use panier fruits or mix
  let dc=dist(player,{x:mixer.x+mixer.w/2,y:mixer.y+mixer.h/2});
  if(dc<130){
    // If near mixer, first try B key to transfer (handled separately)
    // With SPACE near mixer: if inv has enough, make juice
    if(!player.hold){
      let fruit=FK.find(f=>inv[f]>=FRUITS[f].need);
      if(fruit){
        let f=FRUITS[fruit];inv[fruit]-=f.need;player.hold=fruit+'_juice';
        startMixing(fruit);addFloat(mixer.x+mixer.w/2,mixer.y-10,'🧃 '+fruit+'!',f.juice);
      } else {
        // Suggest using B to transfer panier
        let hasFruitsInPanier=FK.some(f=>panier.contents[f]>0);
        if(hasFruitsInPanier){addFloat(mixer.x+mixer.w/2,mixer.y-20,'Press B to unload 🧺','#FFE066');}
      }
    }
    return;
  }
  // Serve customers
  customers.forEach(c=>{
    if(c.status==='waiting'&&dist(player,{x:c.x,y:c.y})<85&&player.hold===c.want+'_juice'){
      let f=FRUITS[c.want];money+=f.pay;
      addPop(c.x,c.y-20,f.juice,14);addSparkle(c.x,c.y-30,'#FFD700');
      addFloat(c.x,c.y-50,'💰 +$'+f.pay,'#FFD700');
      player.hold=null;c.status='happy';c.happyT=100;
    }
  });
}

function startMixing(fruit){
  let f=FRUITS[fruit];
  mixer.mixing=true;mixer.mixTick=0;mixer.mixProgress=0;mixer.mixColor=f.juice;mixer.shake=14;mixer.bubbles=[];
  for(let i=0;i<10;i++)
    mixer.bubbles.push({x:mixer.x+14+Math.random()*(mixer.w-28),y:mixer.y+mixer.h-18,
      vy:-(0.7+Math.random()*1.8),r:2+Math.random()*5,phase:Math.random()*Math.PI*2,life:1});
}

function updateMixer(){
  if(!mixer.mixing)return;
  mixer.mixTick++;mixer.mixProgress=Math.min(1,mixer.mixTick/90);
  if(mixer.shake>0)mixer.shake-=0.6;
  mixer.bubbles.forEach(b=>{
    b.y+=b.vy;b.x+=Math.sin(b.phase+mixer.mixTick*0.12)*1;b.phase+=0.06;b.life-=0.011;
    if(b.life<=0||b.y<mixer.y+8){b.y=mixer.y+mixer.h-18;b.x=mixer.x+14+Math.random()*(mixer.w-28);b.life=1;}
  });
  if(mixer.mixTick%12===0)addPop(mixer.x+mixer.w/2,mixer.y+15,mixer.mixColor,3);
  if(mixer.mixTick>90){mixer.mixing=false;mixer.bubbles=[];}
}

function update(){
  tick++;actionCD=Math.max(0,actionCD-1);
  if(panier.bounce>0)panier.bounce-=0.7;
  let moved=false;
  if(keys['ArrowUp']&&player.y>GROUND_Y-10){player.y-=player.spd;moved=true;}
  if(keys['ArrowDown']){player.y+=player.spd;moved=true;}
  if(keys['ArrowLeft']){player.x-=player.spd;player.dir=-1;moved=true;}
  if(keys['ArrowRight']){player.x+=player.spd;player.dir=1;moved=true;}
  player.x=Math.max(20,Math.min(W-20,player.x));
  player.y=Math.max(GROUND_Y-20,Math.min(H-20,player.y));
  if(moved){player.walkT++;if(player.walkT>7){player.walkT=0;player.walkF=(player.walkF+1)%8;player.footPhase+=0.42;}}
  player.blinkTimer--;if(player.blinkTimer<=0){player.blink=1;setTimeout(()=>player.blink=0,110);player.blinkTimer=75+Math.floor(Math.random()*90);}
  if(keys[' ']){handleAction();keys[' ']=false;}
  trees.forEach(t=>{
    t.sway*=0.92;if(tick%55===0)t.sway+=t.swayDir*(Math.random()*3);
    t.sway+=Math.sin(tick*0.018+t.x*0.01)*0.03;
    if(t.inv===0&&t.regrow>0&&Date.now()>t.regrow){t.inv=FRUITS[t.fruit].need;t.regrow=0;}
  });
  custTimer++;if(custTimer>200&&customers.length<4){customers.push(spawnCustomer());custTimer=0;}
  customers.forEach(c=>{
    c.bob+=0.09;
    if(c.status==='walking'){c.x+=c.speed;if(c.x>c.arriveX){c.status='waiting';c.timer=0;}}
    if(c.status==='waiting'){c.timer+=1/60;if(c.timer>c.patience){c.status='leaving';addFloat(c.x,c.y-40,'😤','#FF4444');}}
    if(c.status==='happy'){c.happyT--;if(c.happyT<=0)c.status='leaving';}
    if(c.status==='leaving')c.x-=c.speed*1.6;
  });
  customers=customers.filter(c=>c.x>-100);
  updateMixer();
  particles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=p.gravity||0.1;p.vx*=0.97;p.life-=0.032;p.r*=0.97;});
  particles=particles.filter(p=>p.life>0);
  floaters.forEach(f=>{f.y+=f.vy;f.life-=0.019;f.vy*=0.97;});
  floaters=floaters.filter(f=>f.life>0);
}

function drawSky(){
  let sky=ctx.createLinearGradient(0,0,0,H);
  sky.addColorStop(0,'#5B9BD5');sky.addColorStop(0.35,'#87CEEB');sky.addColorStop(0.6,'#B8E4A0');sky.addColorStop(1,'#6BBF40');
  ctx.fillStyle=sky;ctx.fillRect(0,0,W,H);
  let sg=ctx.createRadialGradient(820,60,5,820,60,55);
  sg.addColorStop(0,'#FFF8AA');sg.addColorStop(0.4,'#FFE033');sg.addColorStop(1,'rgba(255,200,0,0)');
  ctx.fillStyle=sg;ctx.beginPath();ctx.arc(820,60,55,0,Math.PI*2);ctx.fill();
  [[80,55,1.1],[250,40,0.8],[470,50,1.2],[680,38,0.9],[820,55,0.75]].forEach(([cx,cy,sc])=>{
    ctx.fillStyle='rgba(255,255,255,0.88)';
    ctx.beginPath();ctx.ellipse(cx,cy,55*sc,22*sc,0,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.ellipse(cx-30*sc,cy+7,34*sc,16*sc,0,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.ellipse(cx+30*sc,cy+7,34*sc,16*sc,0,0,Math.PI*2);ctx.fill();
  });
}

function drawBgTree(t){
  let tr=t.s*24,th=t.s*90;
  let wind=Math.sin(tick*0.018+t.x*0.008)*2*t.s;
  ctx.save();ctx.translate(t.x+wind,t.y);
  ctx.fillStyle='#3d2008';ctx.fillRect(-t.s*4,th*0.7,t.s*8,th*0.3);
  for(let layer=0;layer<3;layer++){
    let ly=th*0.7-layer*th*0.25,lr=tr*(1-layer*0.22);
    ctx.fillStyle=layer===0?t.col:layer===1?lighten(t.col,15):lighten(t.col,28);
    ctx.beginPath();ctx.moveTo(0,ly-lr*1.3);ctx.lineTo(-lr*1.2,ly);ctx.lineTo(lr*1.2,ly);ctx.closePath();ctx.fill();
  }
  ctx.restore();
}

function drawGround(){
  let g=ctx.createLinearGradient(0,GROUND_Y-30,0,H);
  g.addColorStop(0,'#5aA030');g.addColorStop(0.08,'#4d9228');g.addColorStop(0.25,'#3d7820');g.addColorStop(0.5,'#4a6820');g.addColorStop(1,'#3a5218');
  ctx.fillStyle=g;ctx.fillRect(0,GROUND_Y-30,W,H-(GROUND_Y-30));
  for(let x=0;x<W;x+=18){
    let h=6+Math.sin(x*0.4+tick*0.02)*3+Math.random()*2;
    ctx.fillStyle=`hsl(${115+Math.sin(x*0.3)*10},${55+Math.random()*15}%,${32+Math.random()*8}%)`;
    ctx.beginPath();ctx.moveTo(x,GROUND_Y-2);ctx.lineTo(x+4,GROUND_Y-2-h);ctx.lineTo(x+9,GROUND_Y-2-h*0.6);ctx.lineTo(x+14,GROUND_Y-2-h*1.1);ctx.lineTo(x+18,GROUND_Y-2);ctx.fill();
  }
  let path=ctx.createLinearGradient(0,GROUND_Y+10,0,GROUND_Y+50);
  path.addColorStop(0,'#7a5a30');path.addColorStop(1,'#6a4a22');
  ctx.fillStyle=path;ctx.beginPath();ctx.ellipse(W/2,GROUND_Y+30,280,22,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='rgba(0,0,0,0.1)';ctx.beginPath();ctx.ellipse(W/2,GROUND_Y+20,280,6,0,0,Math.PI*2);ctx.fill();
  for(let i=0;i<20;i++){
    let gx=30+i*44,gy=GROUND_Y+60+Math.sin(i*1.3)*40;
    ctx.fillStyle=`hsl(${110+i%4*5},45%,${28+i%3*5}%)`;
    ctx.beginPath();ctx.ellipse(gx,gy,18+i%5*4,8,0,0,Math.PI*2);ctx.fill();
  }
  trees.forEach(t=>{
    ctx.fillStyle='rgba(0,0,0,0.12)';
    ctx.beginPath();ctx.ellipse(t.x,GROUND_Y+2,28*t.size,8,0,0,Math.PI*2);ctx.fill();
  });
}

function drawRealisticTree(t){
  let f=FRUITS[t.fruit];
  let sc=t.size;
  let wind=Math.sin(tick*0.022+t.x*0.01)*1.5+t.sway*0.05;
  let gx=t.x,gy=GROUND_Y;
  let trunkH=sc*110,trunkW=sc*14;
  ctx.save();ctx.translate(gx,gy);
  ctx.fillStyle='#3d2008';
  ctx.beginPath();ctx.ellipse(-trunkW*1.2,0,trunkW*0.9,5,0.3,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.ellipse(trunkW*1.2,0,trunkW*0.9,5,-0.3,0,Math.PI*2);ctx.fill();
  ctx.save();ctx.rotate(wind*0.01);
  let tg=ctx.createLinearGradient(-trunkW,0,trunkW,0);
  tg.addColorStop(0,'#2d1505');tg.addColorStop(0.3,'#6b3a10');tg.addColorStop(0.7,'#7B4A1E');tg.addColorStop(1,'#3a1a06');
  ctx.fillStyle=tg;
  ctx.beginPath();ctx.moveTo(-trunkW,-trunkH);ctx.quadraticCurveTo(-trunkW*1.1,-trunkH*0.5,-trunkW*1.1,0);ctx.lineTo(trunkW*1.1,0);ctx.quadraticCurveTo(trunkW*1.1,-trunkH*0.5,trunkW,-trunkH);ctx.closePath();ctx.fill();
  ctx.strokeStyle='rgba(0,0,0,0.18)';ctx.lineWidth=1;
  for(let i=1;i<4;i++){ctx.beginPath();ctx.moveTo(-trunkW*0.4,-trunkH*i/4);ctx.lineTo(trunkW*0.3,-trunkH*i/4+8);ctx.stroke();}
  ctx.restore();
  let cy=-trunkH+sc*10;
  ctx.save();ctx.rotate(wind*0.018);
  ctx.fillStyle='rgba(0,0,0,0.12)';ctx.beginPath();ctx.ellipse(6,cy+8,sc*52,sc*44,0,0,Math.PI*2);ctx.fill();
  let cg=ctx.createRadialGradient(-sc*12,cy-sc*15,sc*5,0,cy,sc*55);
  cg.addColorStop(0,'#55CC33');cg.addColorStop(0.4,'#33AA22');cg.addColorStop(0.75,'#207718');cg.addColorStop(1,'#144d10');
  ctx.fillStyle=cg;ctx.beginPath();ctx.arc(0,cy,sc*50,0,Math.PI*2);ctx.fill();
  [{dx:-sc*30,dy:sc*20,r:sc*30},{dx:sc*28,dy:sc*22,r:sc*28},{dx:-sc*18,dy:-sc*20,r:sc*26},{dx:sc*20,dy:-sc*18,r:sc*25},{dx:0,dy:sc*35,r:sc*24}].forEach(cl=>{
    let clg=ctx.createRadialGradient(cl.dx-6,cl.dy-6,3,cl.dx,cl.dy,cl.r);
    clg.addColorStop(0,'#66DD44');clg.addColorStop(0.5,'#2d9922');clg.addColorStop(1,'#1a6614');
    ctx.fillStyle=clg;ctx.beginPath();ctx.arc(cl.dx,cl.dy,cl.r,0,Math.PI*2);ctx.fill();
  });
  let hl=ctx.createRadialGradient(-sc*20,cy-sc*22,2,-sc*15,cy-sc*18,sc*28);
  hl.addColorStop(0,'rgba(180,255,120,0.35)');hl.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=hl;ctx.beginPath();ctx.arc(-sc*10,cy-sc*10,sc*38,0,Math.PI*2);ctx.fill();
  ctx.restore();
  if(t.inv>0){
    let bobY=Math.sin(tick*0.06+t.x)*2.5;
    let positions=[{fx:-sc*22,fy:cy+sc*12},{fx:sc*20,fy:cy+sc*18},{fx:sc*2,fy:cy+sc*30},{fx:-sc*10,fy:cy-sc*10},{fx:sc*30,fy:cy+sc*5}];
    for(let i=0;i<Math.min(t.inv+2,5);i++){
      let pos=positions[i];
      let frd=ctx.createRadialGradient(pos.fx-3,pos.fy-3+bobY,1,pos.fx,pos.fy+bobY,8*sc);
      frd.addColorStop(0,f.lite);frd.addColorStop(0.6,f.color);frd.addColorStop(1,f.dark);
      ctx.fillStyle=frd;ctx.beginPath();ctx.arc(pos.fx,pos.fy+bobY,8*sc,0,Math.PI*2);ctx.fill();
      ctx.strokeStyle='#3a2008';ctx.lineWidth=1.5;
      ctx.beginPath();ctx.moveTo(pos.fx,pos.fy+bobY-8*sc);ctx.lineTo(pos.fx+3,pos.fy+bobY-12*sc);ctx.stroke();
    }
    ctx.fillStyle='rgba(0,0,0,0.7)';ctx.beginPath();ctx.arc(sc*35,cy,sc*13,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='white';ctx.font=`bold ${Math.round(11*sc)}px Arial`;ctx.textAlign='center';ctx.fillText(t.inv,sc*35,cy+sc*4);
  }else if(t.regrow>0){
    let rem=Math.max(0,(t.regrow-Date.now())/1000);
    ctx.fillStyle='rgba(0,0,0,0.65)';ctx.beginPath();ctx.roundRect(-24,cy-12,48,22,6);ctx.fill();
    ctx.fillStyle='#FFEE88';ctx.font='bold 11px Arial';ctx.textAlign='center';ctx.fillText('⏱ '+Math.ceil(rem)+'s',0,cy+3);
  }
  ctx.restore();
  ctx.fillStyle='rgba(255,255,255,0.85)';ctx.strokeStyle='rgba(0,0,0,0.4)';ctx.lineWidth=2;
  ctx.font='bold 11px Arial';ctx.textAlign='center';
  ctx.strokeText(f.emoji+' ×'+f.need,gx,gy+16);ctx.fillText(f.emoji+' ×'+f.need,gx,gy+16);
  ctx.textAlign='left';
}

function drawMixer(){
  let mx=mixer.x,my=mixer.y,mw=mixer.w,mh=mixer.h;
  let shx=mixer.shake>0?(Math.random()-0.5)*mixer.shake:0;
  ctx.save();ctx.translate(shx,0);
  let tg=ctx.createLinearGradient(mx-10,my+mh,mx-10,my+mh+30);
  tg.addColorStop(0,'#8B5E2A');tg.addColorStop(1,'#6B4518');
  ctx.fillStyle=tg;ctx.beginPath();ctx.roundRect(mx-14,my+mh,mw+28,28,4);ctx.fill();
  ctx.fillStyle='#A0703A';ctx.beginPath();ctx.roundRect(mx-14,my+mh,mw+28,6,4);ctx.fill();
  ctx.fillStyle='#B0B0B0';ctx.beginPath();ctx.roundRect(mx+6,my+mh-10,mw-12,14,3);ctx.fill();
  ctx.fillStyle='#909090';ctx.beginPath();ctx.roundRect(mx+10,my+mh-8,mw-20,10,2);ctx.fill();
  if(mixer.mixing&&mixer.mixProgress>0){
    let clipH=(mh-28)*mixer.mixProgress;
    ctx.save();ctx.beginPath();ctx.roundRect(mx+3,my+mh-10-clipH,mw-6,clipH,5);ctx.clip();
    let jg=ctx.createLinearGradient(mx,my+mh,mx,my);jg.addColorStop(0,mixer.mixColor);jg.addColorStop(1,mixer.mixColor+'99');
    ctx.fillStyle=jg;ctx.fillRect(mx,my,mw,mh);
    mixer.bubbles.forEach(b=>{ctx.globalAlpha=b.life*0.75;ctx.fillStyle='rgba(255,255,255,0.8)';ctx.beginPath();ctx.arc(b.x,b.y,b.r,0,Math.PI*2);ctx.fill();ctx.globalAlpha=1;});
    ctx.save();ctx.translate(mx+mw/2,my+mh*0.6);ctx.rotate(mixer.mixTick*0.22);
    ctx.strokeStyle='rgba(255,255,255,0.7)';ctx.lineWidth=3;ctx.lineCap='round';
    ctx.beginPath();ctx.moveTo(-20,0);ctx.lineTo(20,0);ctx.stroke();
    ctx.beginPath();ctx.moveTo(0,-20);ctx.lineTo(0,20);ctx.stroke();
    ctx.beginPath();ctx.arc(0,0,10,0,Math.PI*2);ctx.stroke();ctx.restore();
    ctx.restore();
    for(let i=0;i<3;i++){let a=tick*0.18+i*Math.PI*2/3;ctx.fillStyle=mixer.mixColor;ctx.globalAlpha=0.85;ctx.beginPath();ctx.arc(mx+mw/2+Math.cos(a)*38,my-18+Math.sin(a)*10,5,0,Math.PI*2);ctx.fill();ctx.globalAlpha=1;}
    ctx.fillStyle='rgba(0,0,0,0.65)';ctx.font='bold 14px Arial';ctx.textAlign='center';ctx.fillText(Math.floor(mixer.mixProgress*100)+'%',mx+mw/2,my+mh/2+5);
  }
  let glassG=ctx.createLinearGradient(mx,my,mx+mw,my);glassG.addColorStop(0,'rgba(160,210,255,0.3)');glassG.addColorStop(0.45,'rgba(255,255,255,0.1)');glassG.addColorStop(1,'rgba(120,180,240,0.22)');
  ctx.fillStyle=glassG;ctx.strokeStyle='rgba(200,230,255,0.75)';ctx.lineWidth=2;
  ctx.beginPath();ctx.roundRect(mx,my,mw,mh-8,10);ctx.fill();ctx.stroke();
  ctx.fillStyle='rgba(255,255,255,0.45)';ctx.beginPath();ctx.roundRect(mx+5,my+8,14,mh-28,5);ctx.fill();
  ctx.fillStyle='#D0D0D0';ctx.beginPath();ctx.roundRect(mx+5,my-14,mw-10,16,4);ctx.fill();
  ctx.fillStyle='#555';ctx.font='bold 10px Arial';ctx.textAlign='center';ctx.fillText('MIXER',mx+mw/2,my-3);
  let ready=FK.filter(f=>inv[f]>=FRUITS[f].need);
  if(ready.length&&!mixer.mixing){ctx.font='18px Arial';ctx.textAlign='center';ready.forEach((f,i)=>ctx.fillText(FRUITS[f].emoji,mx+mw/2+(i-ready.length/2+0.5)*24,my+mh+46));}
  ctx.textAlign='left';ctx.restore();
}

// Draw the basket (panier) near the player
function drawPanier(){
  let bob=Math.sin(player.footPhase)*4+Math.sin(tick*0.04)*1.5;
  let bx=player.x-player.dir*38;
  let by=player.y+bob-10+Math.sin(tick*0.1)*Math.max(0,panier.bounce)*0.4;
  let total=panierTotal();
  let fillRatio=total/panier.maxSlots;

  ctx.save();
  ctx.translate(bx,by);

  // Shadow
  ctx.fillStyle='rgba(0,0,0,0.15)';ctx.beginPath();ctx.ellipse(0,28,16,4,0,0,Math.PI*2);ctx.fill();

  // Basket body
  let bg=ctx.createLinearGradient(-18,-5,18,26);
  bg.addColorStop(0,'#C8822A');bg.addColorStop(0.5,'#A86020');bg.addColorStop(1,'#8B4A14');
  ctx.fillStyle=bg;
  ctx.beginPath();ctx.moveTo(-18,0);ctx.lineTo(-20,24);ctx.lineTo(20,24);ctx.lineTo(18,0);ctx.closePath();ctx.fill();

  // Weave lines horizontal
  ctx.strokeStyle='rgba(0,0,0,0.22)';ctx.lineWidth=1.2;
  for(let i=1;i<4;i++){let yy=i*6;ctx.beginPath();ctx.moveTo(-18+i*0.5,yy);ctx.lineTo(18-i*0.5,yy);ctx.stroke();}
  // Weave lines vertical
  for(let i=-3;i<=3;i++){ctx.beginPath();ctx.moveTo(i*5,0);ctx.lineTo(i*5+1.5,24);ctx.stroke();}

  // Rim
  ctx.fillStyle='#D49032';ctx.beginPath();ctx.roundRect(-20,-5,40,8,4);ctx.fill();
  ctx.strokeStyle='#A06010';ctx.lineWidth=1.5;ctx.strokeRect(-20,-5,40,8);

  // Handle
  ctx.strokeStyle='#8B4A14';ctx.lineWidth=4;ctx.lineCap='round';
  ctx.beginPath();ctx.arc(0,-18,14,Math.PI,0);ctx.stroke();
  ctx.strokeStyle='#C8822A';ctx.lineWidth=2;ctx.beginPath();ctx.arc(0,-18,14,Math.PI,0);ctx.stroke();

  // Fill color based on contents
  if(total>0){
    ctx.save();ctx.beginPath();ctx.moveTo(-18,0);ctx.lineTo(-20,24);ctx.lineTo(20,24);ctx.lineTo(18,0);ctx.closePath();ctx.clip();
    let fillH=24*fillRatio;
    let fc=ctx.createLinearGradient(0,24-fillH,0,24);
    fc.addColorStop(0,'rgba(255,220,80,0.55)');fc.addColorStop(1,'rgba(255,160,30,0.4)');
    ctx.fillStyle=fc;ctx.fillRect(-20,24-fillH,40,fillH);
    ctx.restore();
  }

  ctx.restore();

  // Floating fruit emojis above basket
  if(total>0){
    let fruits=FK.filter(f=>panier.contents[f]>0);
    ctx.font='11px Arial';ctx.textAlign='center';
    fruits.slice(0,3).forEach((f,i)=>{
      let ex=bx+(i-fruits.length/2+0.5)*14;
      let ey=by-32+Math.sin(tick*0.08+i)*3;
      ctx.fillText(FRUITS[f].emoji,ex,ey);
    });
    if(fruits.length>3){ctx.fillStyle='#fff';ctx.font='bold 9px Arial';ctx.fillText('+',bx+22,by-28);}
    ctx.textAlign='left';

    // Count badge
    ctx.fillStyle='rgba(0,0,0,0.7)';ctx.beginPath();ctx.arc(bx+16,by-8,9,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#FFE066';ctx.font='bold 9px Arial';ctx.textAlign='center';ctx.fillText(total,bx+16,by-5);ctx.textAlign='left';
  }

  // Full indicator
  if(panierFull()){
    ctx.fillStyle='rgba(255,60,30,0.9)';ctx.beginPath();ctx.roundRect(bx-22,by-50,44,16,6);ctx.fill();
    ctx.fillStyle='white';ctx.font='bold 9px Arial';ctx.textAlign='center';ctx.fillText('FULL!',bx,by-40);ctx.textAlign='left';
  }
}

// Draw panier inventory panel
function drawPanierPanel(){
  let px=10,py=10,pw=170,ph=90;
  ctx.fillStyle='rgba(80,40,10,0.82)';ctx.beginPath();ctx.roundRect(px,py,pw,ph,10);ctx.fill();
  ctx.strokeStyle='rgba(200,140,40,0.7)';ctx.lineWidth=2;ctx.beginPath();ctx.roundRect(px,py,pw,ph,10);ctx.stroke();

  // Basket icon label
  ctx.font='bold 12px Arial';ctx.fillStyle='#FFE066';ctx.textAlign='left';ctx.fillText('🧺 Panier',px+10,py+18);

  // Capacity bar
  let total=panierTotal();
  let barW=pw-20;
  ctx.fillStyle='rgba(0,0,0,0.4)';ctx.beginPath();ctx.roundRect(px+10,py+24,barW,7,3);ctx.fill();
  let fillW=barW*(total/panier.maxSlots);
  let barColor=total>=panier.maxSlots?'#FF4422':total>panier.maxSlots*0.7?'#FFAA00':'#66DD44';
  ctx.fillStyle=barColor;ctx.beginPath();ctx.roundRect(px+10,py+24,fillW,7,3);ctx.fill();
  ctx.fillStyle='rgba(255,255,255,0.6)';ctx.font='9px Arial';ctx.textAlign='right';ctx.fillText(total+'/'+panier.maxSlots,px+pw-10,py+31);ctx.textAlign='left';

  // Fruit contents
  let fruits=FK.filter(f=>panier.contents[f]>0);
  if(fruits.length===0){
    ctx.fillStyle='rgba(255,255,255,0.35)';ctx.font='10px Arial';ctx.fillText('(vide — appuie SPACE sur un arbre)',px+10,py+55);
  } else {
    fruits.forEach((f,i)=>{
      let col=i<3?0:1;let row=i%3;
      let ex=px+12+col*80,ey=py+48+row*16;
      ctx.font='12px Arial';ctx.fillText(FRUITS[f].emoji,ex,ey);
      ctx.font='bold 10px Arial';ctx.fillStyle='#fff';ctx.fillText('×'+panier.contents[f],ex+16,ey);
      ctx.fillStyle='#FFE066';
    });
  }
  ctx.textAlign='left';
}

function drawPlayer(){
  // Draw panier first (behind player body)
  if(!player.hold){drawPanier();}

  let bob=Math.sin(player.footPhase)*4+Math.sin(tick*0.04)*1.5;
  let px=player.x,py=player.y+bob;
  ctx.fillStyle='rgba(0,0,0,0.18)';ctx.beginPath();ctx.ellipse(px,py+2,16,5,0,0,Math.PI*2);ctx.fill();
  ctx.save();ctx.translate(px,py);if(player.dir<0)ctx.scale(-1,1);
  let legS=Math.sin(player.footPhase)*12;
  ctx.fillStyle='#331100';ctx.save();ctx.translate(-6,14);ctx.rotate(legS*Math.PI/180);ctx.beginPath();ctx.roundRect(-4,10,10,5,2);ctx.fill();ctx.restore();
  ctx.fillStyle='#331100';ctx.save();ctx.translate(6,14);ctx.rotate(-legS*Math.PI/180);ctx.beginPath();ctx.roundRect(-4,10,10,5,2);ctx.fill();ctx.restore();
  ctx.fillStyle='#2233AA';ctx.save();ctx.translate(-6,12);ctx.rotate(legS*Math.PI/180);ctx.fillRect(-4,0,8,14);ctx.restore();
  ctx.fillStyle='#2233AA';ctx.save();ctx.translate(6,12);ctx.rotate(-legS*Math.PI/180);ctx.fillRect(-4,0,8,14);ctx.restore();
  let bg=ctx.createLinearGradient(-11,-18,11,4);bg.addColorStop(0,'#5566EE');bg.addColorStop(1,'#3344BB');
  ctx.fillStyle=bg;ctx.beginPath();ctx.roundRect(-11,-18,22,22,4);ctx.fill();
  ctx.fillStyle='rgba(255,255,255,0.2)';ctx.beginPath();ctx.roundRect(-9,-16,8,8,3);ctx.fill();
  ctx.fillStyle='#FFCC88';ctx.save();ctx.translate(-12,-8);ctx.rotate(-0.3+legS*0.01);ctx.fillRect(-4,-2,8,14);ctx.restore();
  ctx.fillStyle='#FFCC88';ctx.save();ctx.translate(12,-8);ctx.rotate(0.3-legS*0.01);ctx.fillRect(-4,-2,8,14);ctx.restore();
  let hg=ctx.createRadialGradient(-3,-34,2,0,-31,14);hg.addColorStop(0,'#FFE4AA');hg.addColorStop(1,'#FFCC88');
  ctx.fillStyle=hg;ctx.beginPath();ctx.arc(0,-31,13,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#885522';ctx.beginPath();ctx.ellipse(0,-43,12,7,0,Math.PI,Math.PI*2);ctx.fill();
  ctx.fillStyle='#663311';ctx.beginPath();ctx.ellipse(-5,-40,5,4,0.4,Math.PI,Math.PI*2);ctx.fill();
  if(!player.blink){
    ctx.fillStyle='#222';ctx.beginPath();ctx.arc(-4,-32,2.5,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.arc(4,-32,2.5,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='white';ctx.beginPath();ctx.arc(-3,-33,1,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.arc(5,-33,1,0,Math.PI*2);ctx.fill();
  }else{ctx.strokeStyle='#222';ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(-6,-32);ctx.lineTo(-2,-32);ctx.stroke();ctx.beginPath();ctx.moveTo(2,-32);ctx.lineTo(6,-32);ctx.stroke();}
  ctx.strokeStyle='#CC7755';ctx.lineWidth=1.5;ctx.beginPath();ctx.arc(0,-27,3,0.1,Math.PI-0.1);ctx.stroke();
  ctx.restore();
  if(player.hold){
    let jf=player.hold.replace('_juice',''),jc=FRUITS[jf]?FRUITS[jf].juice:'#fff';
    ctx.save();ctx.translate(player.x+player.dir*16,player.y+bob-55);
    let jug=ctx.createLinearGradient(0,0,50,0);jug.addColorStop(0,jc+'BB');jug.addColorStop(0.5,'rgba(255,255,255,0.4)');jug.addColorStop(1,jc+'BB');
    ctx.fillStyle=jug;ctx.strokeStyle='rgba(255,255,255,0.7)';ctx.lineWidth=1.5;
    ctx.beginPath();ctx.roundRect(-2,0,54,22,6);ctx.fill();ctx.stroke();
    ctx.fillStyle='rgba(0,0,0,0.8)';ctx.font='bold 10px Arial';ctx.textAlign='center';ctx.fillText(jf+' 🧃',25,14);ctx.textAlign='left';ctx.restore();
  }
}

function drawCustomer(c){
  let bob=Math.sin(c.bob)*(c.status==='walking'?4:2.5);
  ctx.fillStyle='rgba(0,0,0,0.14)';ctx.beginPath();ctx.ellipse(c.x,c.y+4,14,4,0,0,Math.PI*2);ctx.fill();
  ctx.save();ctx.translate(c.x,c.y+bob);ctx.scale(c.scale,c.scale);
  let lgs=c.status==='walking'?Math.sin(c.bob*2)*14:0;
  let bodyC=`hsl(${c.hue},55%,42%)`;
  ctx.fillStyle='#7a5020';ctx.save();ctx.translate(-6,10);ctx.rotate(lgs*Math.PI/180);ctx.beginPath();ctx.roundRect(-4,0,8,13,2);ctx.fill();ctx.restore();
  ctx.fillStyle='#8a6030';ctx.save();ctx.translate(6,10);ctx.rotate(-lgs*Math.PI/180);ctx.beginPath();ctx.roundRect(-4,0,8,13,2);ctx.fill();ctx.restore();
  ctx.fillStyle=bodyC;ctx.beginPath();ctx.roundRect(-11,-18,22,22,5);ctx.fill();
  ctx.fillStyle=`hsl(${c.hue},55%,58%)`;ctx.beginPath();ctx.roundRect(-8,-14,7,7,3);ctx.fill();
  let skinTone=c.status==='happy'?'#FFDD88':'#FFCC88';
  let hg=ctx.createRadialGradient(-3,-30,2,0,-28,11);hg.addColorStop(0,skinTone);hg.addColorStop(1,'#DDAA66');
  ctx.fillStyle=hg;ctx.beginPath();ctx.arc(0,-28,11,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#553311';ctx.beginPath();ctx.ellipse(0,-38,9,5,0,Math.PI,Math.PI*2);ctx.fill();
  if(c.status!=='leaving'){ctx.fillStyle='#222';ctx.beginPath();ctx.arc(-3,-29,2,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.arc(3,-29,2,0,Math.PI*2);ctx.fill();ctx.fillStyle='white';ctx.beginPath();ctx.arc(-2,-30,0.8,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.arc(4,-30,0.8,0,Math.PI*2);ctx.fill();}
  ctx.strokeStyle=c.status==='happy'?'#22AA22':'#CC4444';ctx.lineWidth=1.5;ctx.beginPath();ctx.arc(0,-24,4,0.1,Math.PI-0.1);ctx.stroke();
  ctx.restore();
  if(c.status==='waiting'){
    let prog=c.timer/c.patience;
    ctx.fillStyle='rgba(0,0,0,0.55)';ctx.beginPath();ctx.roundRect(c.x-22,c.y-58,44,7,3);ctx.fill();
    ctx.fillStyle=prog>0.7?'#FF3333':prog>0.4?'#FFAA00':'#44DD44';ctx.beginPath();ctx.roundRect(c.x-22,c.y-58,44*(1-prog),7,3);ctx.fill();
    ctx.fillStyle='rgba(255,255,245,0.95)';ctx.strokeStyle='rgba(0,0,0,0.25)';ctx.lineWidth=1;
    ctx.beginPath();ctx.roundRect(c.x-30,c.y-90,60,26,6);ctx.fill();ctx.stroke();
    ctx.fillStyle='rgba(255,255,245,0.95)';ctx.beginPath();ctx.moveTo(c.x-5,c.y-65);ctx.lineTo(c.x,c.y-58);ctx.lineTo(c.x+5,c.y-65);ctx.fill();
    ctx.fillStyle='#222';ctx.font='13px Arial';ctx.textAlign='center';ctx.fillText(FRUITS[c.want].emoji+' juice?',c.x,c.y-74);ctx.textAlign='left';
  }
  if(c.status==='happy'){
    ctx.font='18px Arial';ctx.textAlign='center';
    ctx.fillText('⭐',c.x+Math.sin(tick*0.2)*10,c.y-68+Math.sin(tick*0.15)*6);
    ctx.fillText('✨',c.x-18+Math.sin(tick*0.28)*5,c.y-52);ctx.textAlign='left';
  }
}

function drawParticles(){
  particles.forEach(p=>{
    ctx.globalAlpha=Math.max(0,p.life);
    if(p.type==='star'){
      ctx.save();ctx.translate(p.x,p.y);ctx.rotate(p.rot+tick*0.06);ctx.fillStyle=p.color;ctx.beginPath();
      for(let i=0;i<5;i++){let a=i*Math.PI*2/5-Math.PI/2;ctx.lineTo(Math.cos(a)*p.r,Math.sin(a)*p.r);let b=a+Math.PI/5;ctx.lineTo(Math.cos(b)*p.r*0.4,Math.sin(b)*p.r*0.4);}
      ctx.closePath();ctx.fill();ctx.restore();
    }else{ctx.fillStyle=p.color;ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fill();}
    ctx.globalAlpha=1;
  });
}

function drawFloaters(){
  floaters.forEach(f=>{
    ctx.globalAlpha=Math.max(0,f.life);ctx.strokeStyle='rgba(0,0,0,0.55)';ctx.lineWidth=3;ctx.font='bold 14px Arial';ctx.textAlign='center';
    ctx.strokeText(f.txt,f.x,f.y);ctx.fillStyle=f.color;ctx.fillText(f.txt,f.x,f.y);
    ctx.globalAlpha=1;ctx.textAlign='left';
  });
}

function drawHint(){
  let hints=[];
  trees.forEach(t=>{
    if(dist(player,{x:t.x,y:GROUND_Y})<90&&t.inv>0){
      hints.push(panierFull()?'🧺 Full! Go unload at mixer (B)':'SPACE: récolter '+FRUITS[t.fruit].emoji+' → 🧺');
    }
  });
  let dc=dist(player,{x:mixer.x+mixer.w/2,y:mixer.y+mixer.h/2});
  if(dc<130){
    if(panierTotal()>0&&!mixer.mixing)hints.push('B: vider le panier dans le mixer');
    if(!player.hold&&FK.some(f=>inv[f]>=FRUITS[f].need))hints.push('SPACE: faire du jus');
  }
  customers.forEach(c=>{if(c.status==='waiting'&&dist(player,{x:c.x,y:c.y})<85&&player.hold===c.want+'_juice')hints.push('SPACE: servir!');});
  if(hints.length){
    ctx.fillStyle='rgba(0,0,0,0.65)';ctx.beginPath();ctx.roundRect(W/2-180,H-40,360,28,7);ctx.fill();
    ctx.fillStyle='white';ctx.font='bold 12px Arial';ctx.textAlign='center';ctx.fillText(hints[0],W/2,H-21);ctx.textAlign='left';
  }
}

function drawHUD(){
  hud.innerHTML=
    `<span style="font-size:16px;font-weight:bold;color:#FFD700">💰 $${money}</span>`+
    `<span style="color:#FFE066;background:rgba(80,40,10,0.6);padding:1px 6px;border-radius:4px">🧺 ${panierTotal()}/${panier.maxSlots}</span>`+
    FK.map(f=>`<span style="color:${FRUITS[f].juice}">${FRUITS[f].emoji} ${inv[f]}/${FRUITS[f].need}</span>`).join('')+
    (player.hold?`<span style="background:rgba(255,220,0,0.18);padding:2px 8px;border-radius:6px;color:#FFE066">🧃 ${player.hold.replace('_',' ')}</span>`:'');
}

function loop(){
  update();drawSky();
  bgTrees.sort((a,b)=>a.y-b.y).forEach(drawBgTree);
  drawGround();trees.forEach(drawRealisticTree);drawMixer();
  customers.forEach(drawCustomer);drawPlayer();drawParticles();drawFloaters();
  drawPanierPanel();drawHint();drawHUD();
  requestAnimationFrame(loop);
}
loop();
</script>
</body>
