<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>🦁 Stil Land - Smoothies</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100vw;height:100vh;overflow:hidden;background:linear-gradient(160deg,#0d3a08 0%,#1a6a10 30%,#2a8a18 60%,#1a5a08 100%);font-family:'Nunito',sans-serif;user-select:none;}
#shell{position:absolute;transform-origin:top left;width:1024px;height:620px;}
canvas{display:block;width:1024px;height:620px;}

/* ── SPLASH SCREEN ── */
#splash-screen{
  position:absolute;inset:0;z-index:200;
  background:#000;
  display:flex;flex-direction:column;align-items:center;justify-content:flex-end;
  overflow:hidden;
}
#splash-screen.hidden{display:none;}
#splash-bg{
  position:absolute;inset:0;
  background-image:url('assets/first_page.png');
  background-size:cover;
  background-position:center;
}
#btn-splash-play{
  position:relative;z-index:2;
  margin-bottom:36px;
  background:none;
  border:none;
  cursor:pointer;
  padding:0;
  width:280px;
  filter:drop-shadow(0 6px 24px rgba(0,0,0,.6));
  transition:transform .14s, filter .14s;
}
#btn-splash-play:hover{transform:scale(1.08);filter:drop-shadow(0 10px 32px rgba(255,180,0,.5));}
#btn-splash-play:active{transform:scale(.96);}
#btn-splash-play img{width:100%;height:auto;display:block;}

/* ── RULES SCREEN (second_page bg, blurred when modal open) ── */
#welcome-screen{
  position:absolute;inset:0;z-index:100;
  background-image:url('assets/first_page.png');
  background-size:cover;background-position:center;
  display:flex;align-items:center;justify-content:center;
  overflow:hidden;
}
#welcome-screen.hidden{display:none;}

/* Blur overlay behind modal */
#ws-blur{
  position:absolute;inset:0;
  background:rgba(0,0,0,0);
  backdrop-filter:blur(0px);
  transition:backdrop-filter .4s ease, background .4s ease;
  z-index:1;
}
#ws-blur.active{
  backdrop-filter:blur(6px);
  background:rgba(0,0,0,0.35);
}

/* HOW TO PLAY modal card */
#ws-modal{
  position:relative;z-index:2;
  display:flex;flex-direction:column;align-items:center;
  opacity:0;transform:scale(0.88);
  transition:opacity .35s ease, transform .35s cubic-bezier(.34,1.56,.64,1);
  pointer-events:none;
}
#ws-modal.visible{
  opacity:1;transform:scale(1);pointer-events:auto;
}
#ws-modal-img{
  margin-top:100px;
  width:700px;max-width:95vw;
  filter:drop-shadow(0 16px 48px rgba(0,0,0,0.7));
  display:block;}

/* SKIP button */
#btn-skip{
  margin-top:-85px;
  background:none;border:none;cursor:pointer;padding:0;
  width:220px;
  filter:drop-shadow(0 4px 18px rgba(0,0,0,.55));
  transition:transform .14s,filter .14s;
}
#btn-skip:hover{transform:scale(1.08);filter:drop-shadow(0 8px 28px rgba(255,160,0,.5));}
#btn-skip:active{transform:scale(.95);}
#btn-skip img{width:100%;height:auto;display:block;}

#hud{position:absolute;top:12px;left:0;right:0;display:flex;justify-content:space-between;align-items:center;padding:0 16px;z-index:20;pointer-events:none}
.pill{display:flex;align-items:center;gap:7px;padding:8px 20px;border-radius:50px;font-family:'Fredoka One',cursive;font-size:20px;box-shadow:0 4px 14px rgba(0,0,0,.35);border:3px solid rgba(255,255,255,.4)}
.pg{background:linear-gradient(135deg,#FFD030,#FF9500);color:#fff}
.pp{background:linear-gradient(135deg,#9B5FFF,#6B35CC);color:#fff}
.pill span{text-shadow:0 2px 4px rgba(0,0,0,.25)}

#corner-btns{position:absolute;top:70px;right:14px;display:flex;flex-direction:column;gap:8px;z-index:25;}
.corner-btn{width:48px;height:48px;border-radius:14px;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:20px;box-shadow:0 4px 16px rgba(0,0,0,.35);transition:transform .15s,box-shadow .15s;position:relative;}
.corner-btn:hover{transform:scale(1.1);box-shadow:0 6px 22px rgba(0,0,0,.45);}
.corner-btn.active{outline:3px solid #FFD700;}
#btn-settings{background:linear-gradient(135deg,#FF9500,#FF5500);}
#btn-stock{background:linear-gradient(135deg,#44CC66,#1A8A3A);}
#btn-trash{background:linear-gradient(135deg,#CC3333,#881111);}

#speed-panel{position:absolute;top:70px;right:70px;background:rgba(20,14,8,.92);backdrop-filter:blur(8px);border-radius:18px;padding:16px 18px;box-shadow:0 8px 32px rgba(0,0,0,.5);border:2px solid rgba(255,160,60,.3);z-index:24;min-width:210px;transform-origin:top right;transition:transform .2s cubic-bezier(.34,1.56,.64,1),opacity .15s;}
#speed-panel.hidden{transform:scale(0);opacity:0;pointer-events:none;}
#speed-panel h3{font-family:'Fredoka One',cursive;font-size:14px;color:#FF9A3C;margin-bottom:12px;text-align:center;letter-spacing:.5px;text-transform:uppercase;}
.sp-row{display:flex;align-items:center;gap:8px;margin-bottom:9px}
.sp-row label{font-size:11px;font-weight:900;color:#bbb;min-width:72px}
.sp-row input[type=range]{flex:1;-webkit-appearance:none;height:6px;border-radius:4px;background:rgba(255,255,255,.15);outline:none;cursor:pointer}
.sp-row input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:18px;height:18px;border-radius:50%;background:linear-gradient(135deg,#FF9500,#FF5500);cursor:pointer;box-shadow:0 2px 6px rgba(0,0,0,.4)}
.sp-val{font-family:'Fredoka One',cursive;font-size:13px;color:#FF9500;min-width:32px;text-align:right}
.sp-divider{border:none;border-top:1px solid rgba(255,255,255,.1);margin:8px 0}

#stock-panel{position:absolute;top:70px;right:70px;background:rgba(20,14,8,.92);backdrop-filter:blur(8px);border-radius:18px;padding:14px 16px;box-shadow:0 8px 32px rgba(0,0,0,.5);border:2px solid rgba(60,200,90,.3);z-index:24;min-width:180px;transform-origin:top right;transition:transform .2s cubic-bezier(.34,1.56,.64,1),opacity .15s;}
#stock-panel.hidden{transform:scale(0);opacity:0;pointer-events:none;}
#stock-panel h3{font-family:'Fredoka One',cursive;font-size:13px;color:#44DD66;margin-bottom:10px;text-align:center;letter-spacing:.5px;text-transform:uppercase;}
.sk-row{display:flex;align-items:center;gap:7px;margin-bottom:7px}
.sk-bar-bg{flex:1;height:10px;border-radius:5px;background:rgba(255,255,255,.1);overflow:hidden}
.sk-bar{height:100%;border-radius:5px;transition:width .3s}
.sk-count{font-family:'Fredoka One',cursive;font-size:12px;color:#eee;min-width:18px;text-align:right}

#trash-confirm{
position:absolute;top:70px;right:70px;
background:rgba(20,5,5,.94);backdrop-filter:blur(8px);
border-radius:18px;padding:16px 18px;
box-shadow:0 8px 32px rgba(0,0,0,.5);
border:2px solid rgba(220,60,60,.4);
z-index:24;min-width:200px;text-align:center;
transform-origin:top right;
transition:transform .2s cubic-bezier(.34,1.56,.64,1),opacity .15s;
}
#trash-confirm.hidden{transform:scale(0);opacity:0;pointer-events:none;}
#trash-confirm h3{font-family:'Fredoka One',cursive;font-size:14px;color:#FF6666;margin-bottom:8px;}
#trash-confirm p{font-size:12px;color:#ccc;margin-bottom:12px;line-height:1.4;}
.tc-btns{display:flex;gap:8px;justify-content:center;}
.tc-btn{font-family:'Fredoka One',cursive;font-size:13px;border:none;border-radius:10px;padding:7px 16px;cursor:pointer;}
#tc-yes{background:linear-gradient(135deg,#DD3333,#AA1111);color:#fff;}
#tc-no{background:rgba(255,255,255,.12);color:#ddd;border:1px solid rgba(255,255,255,.2);}

/* ── FRUIT PICKER ── */
#fruit-picker{
  position:absolute;
  left:50%;bottom:90px;
  transform:translateX(-50%) translateY(0) scale(1);
  background:rgba(14,8,4,.93);
  backdrop-filter:blur(10px);
  border-radius:22px;
  padding:14px 18px 16px;
  box-shadow:0 12px 40px rgba(0,0,0,.65);
  border:2px solid rgba(255,200,60,.4);
  z-index:35;
  min-width:260px;
  max-width:560px;
  transform-origin:bottom center;
  transition:transform .22s cubic-bezier(.34,1.56,.64,1),opacity .15s;
}
#fruit-picker.hidden{transform:translateX(-50%) scale(0);opacity:0;pointer-events:none;}
#fruit-picker h3{
  font-family:'Fredoka One',cursive;font-size:14px;color:#FFD060;
  text-align:center;margin-bottom:10px;letter-spacing:.5px;text-transform:uppercase;
}
#fp-options{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;}
.fp-btn{
  display:flex;flex-direction:column;align-items:center;gap:3px;
  background:rgba(255,255,255,.09);
  border:2px solid rgba(255,255,255,.18);
  border-radius:14px;padding:8px 14px;cursor:pointer;
  transition:transform .12s,background .12s,border-color .12s;
  font-family:'Fredoka One',cursive;
}
.fp-btn:hover{transform:scale(1.1);background:rgba(255,200,60,.22);border-color:rgba(255,200,60,.7);}
.fp-btn:active{transform:scale(.95);}
.fp-em{font-size:28px;line-height:1;}
.fp-label{font-size:11px;color:#ddd;}
.fp-count{
  font-size:12px;color:#FFD060;
  background:rgba(255,200,60,.2);border-radius:8px;padding:1px 6px;
}
.fp-cancel{
  display:block;margin:10px auto 0;
  font-family:'Fredoka One',cursive;font-size:12px;
  background:none;border:1px solid rgba(255,255,255,.2);
  border-radius:8px;padding:4px 16px;color:#aaa;cursor:pointer;
}
.fp-cancel:hover{background:rgba(255,255,255,.1);color:#fff;}

/* ── MESSAGE SYSTEM ── */
#msg-box{
  position:absolute;
  bottom:58px;left:50%;
  transform:translateX(-50%);
  width:560px;
  background:rgba(10,6,3,.94);
  backdrop-filter:blur(12px);
  border-radius:18px;
  border:2px solid rgba(255,210,80,.35);
  box-shadow:0 10px 40px rgba(0,0,0,.6);
  padding:12px 16px 10px;
  z-index:38;
  display:flex;gap:12px;align-items:flex-start;
  transition:opacity .25s, transform .25s cubic-bezier(.34,1.56,.64,1);
  pointer-events:none;
}
#msg-box.msg-hidden{
  opacity:0;
  transform:translateX(-50%) translateY(14px) scale(.96);
  pointer-events:none;
}
#msg-box.msg-visible{
  opacity:1;
  transform:translateX(-50%) translateY(0) scale(1);
}
#msg-avatar{
  width:44px;height:44px;border-radius:50%;
  background:linear-gradient(135deg,#C8841A,#7a3808);
  border:2px solid rgba(255,210,80,.6);
  display:flex;align-items:center;justify-content:center;
  font-size:24px;flex-shrink:0;
  box-shadow:0 2px 10px rgba(0,0,0,.4);
}
#msg-body{flex:1;min-width:0;}
#msg-name{
  font-family:'Fredoka One',cursive;
  font-size:12px;color:#FFD060;
  margin-bottom:4px;letter-spacing:.4px;
}
#msg-text{
  font-family:'Nunito',sans-serif;
  font-size:13px;color:#f0f0e8;
  line-height:1.5;
  min-height:18px;
}
#msg-dots{
  display:flex;gap:4px;align-items:center;
  margin-top:6px;
}
.msg-dot{
  width:6px;height:6px;border-radius:50%;
  background:rgba(255,210,80,.5);
  animation:msgdot .9s infinite;
}
.msg-dot:nth-child(2){animation-delay:.2s;}
.msg-dot:nth-child(3){animation-delay:.4s;}
@keyframes msgdot{0%,80%,100%{transform:scale(.6);opacity:.4}40%{transform:scale(1);opacity:1}}
#msg-continue{
  font-family:'Fredoka One',cursive;
  font-size:10px;color:rgba(255,210,80,.6);
  margin-top:5px;
  animation:blink 1.2s infinite;
  display:none;
}
@keyframes blink{0%,100%{opacity:.4}50%{opacity:1}}

#tip{position:absolute;bottom:16px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.78);color:#fff;font-family:'Fredoka One',cursive;font-size:15px;padding:9px 28px;border-radius:50px;z-index:20;pointer-events:none;white-space:nowrap;box-shadow:0 4px 14px rgba(0,0,0,.3);border:2px solid rgba(255,255,255,.15)}

#notif{position:absolute;top:46%;left:50%;transform:translate(-50%,-50%) scale(0);background:#fff;border-radius:22px;padding:14px 32px;box-shadow:0 10px 40px rgba(0,0,0,.3);font-family:'Fredoka One',cursive;font-size:22px;color:#333;text-align:center;transition:transform .2s cubic-bezier(.34,1.56,.64,1);z-index:40;pointer-events:none;white-space:nowrap;border:3px solid rgba(255,200,0,.4)}
#notif.show{transform:translate(-50%,-50%) scale(1)}

#transition{position:absolute;inset:0;background:#000;opacity:0;border-radius:22px;z-index:50;pointer-events:none;transition:opacity .35s ease}
#transition.fade-in{opacity:1}

.fl{position:absolute;pointer-events:none;z-index:30;font-family:'Fredoka One',cursive;font-size:18px;text-shadow:0 2px 6px rgba(0,0,0,.45);animation:fup 1.4s forwards;white-space:nowrap}
@keyframes fup{0%{opacity:1;transform:translateY(0)}70%{opacity:1;transform:translateY(-55px)}100%{opacity:0;transform:translateY(-80px)}}
</style>
</head>
<body>
<div id="shell">
<canvas id="c" width="1024" height="620"></canvas>

<div id="splash-screen">
  <div id="splash-bg"></div>
  <button id="btn-splash-play">
    <img src="assets/playbutton.png" alt="PLAY">
  </button>
</div>

<div id="welcome-screen" class="hidden">
  <div id="ws-blur"></div>
  <div id="ws-modal">
    <img id="ws-modal-img" src="assets/_image.png" alt="How to Play">
    <button id="btn-skip">
      <img src="assets/bouton_skip.png" alt="SKIP">
    </button>
  </div>
</div>
<div id="hud">
  <div class="pill pg">💰 <span id="hM">$0</span></div>
  <div class="pill pp">⭐ Niv <span id="hL">1</span> &nbsp;|&nbsp; 🧺 <span id="hB">0</span></div>
</div>

<div id="corner-btns">
  <button class="corner-btn" id="btn-settings" title="Réglages camion">⚙️</button>
  <button class="corner-btn" id="btn-stock" title="Stock">🧃</button>
  <button class="corner-btn" id="btn-trash" title="Jeter le jus en main" style="display:none;">🗑️</button>
</div>

<div id="speed-panel" class="hidden">
  <h3>🚛 Réglages camion</h3>
  <div class="sp-row"><label>Vitesse max</label><input type="range" id="slSpeed" min="1" max="10" step=".5" value="4.2"><span class="sp-val" id="valSpeed">4.2</span></div>
  <div class="sp-row"><label>Accélération</label><input type="range" id="slAcc" min=".05" max=".6" step=".05" value=".18"><span class="sp-val" id="valAcc">0.18</span></div>
  <div class="sp-row"><label>Freinage</label><input type="range" id="slFric" min=".7" max=".98" step=".02" value=".88"><span class="sp-val" id="valFric">0.88</span></div>
  <hr class="sp-divider">
  <div class="sp-row"><label>Vitesse joueur</label><input type="range" id="slPspd" min="1" max="6" step=".5" value="2.8"><span class="sp-val" id="valPspd">2.8</span></div>
</div>

<div id="stock-panel" class="hidden">
  <h3>🧃 Stock</h3>
  <div id="stock-rows"></div>
</div>

<div id="trash-confirm" class="hidden">
  <h3>🗑️ Jeter le jus ?</h3>
  <p id="trash-desc">Tu vas jeter ce jus.<br>Il sera perdu définitivement.</p>
  <div class="tc-btns">
    <button class="tc-btn" id="tc-yes">Jeter</button>
    <button class="tc-btn" id="tc-no">Annuler</button>
  </div>
</div>

<div id="fruit-picker" class="hidden">
  <h3>⚡ Quel fruit mixer ?</h3>
  <div id="fp-options"></div>
  <button class="fp-cancel" id="fp-cancel">Annuler</button>
</div>

<div id="msg-box" class="msg-hidden">
  <div id="msg-avatar">🦁</div>
  <div id="msg-body">
    <div id="msg-name">Barista</div>
    <div id="msg-text"></div>
    <div id="msg-dots"><div class="msg-dot"></div><div class="msg-dot"></div><div class="msg-dot"></div></div>
    <div id="msg-continue">▶ suite…</div>
  </div>
</div>

<div id="tip">Monte dans le 🚛 camion et appuie sur [E] pour conduire vers la forêt !</div>
<div id="notif"></div>
<div id="transition"></div>
</div>

<script>
const cv = document.getElementById('c');
const gx = cv.getContext('2d');
const W = 1024, H = 620;
const ROAD_Y = 370, ROAD_H = 46;

// ── FIX: patience in frames at 60fps. 3600 = 60s, 3000 = 50s ──
const PATIENCE_FRAMES = 3000; // 50 seconds

const FRUITS = [
  { key:'orange', em:'🍊', fruit:'#FF8800', pay:12, label:'Orange' },
  { key:'apple',  em:'🍎', fruit:'#DD2222', pay:10, label:'Pomme' },
  { key:'lemon',  em:'🍋', fruit:'#DDDD00', pay:8,  label:'Citron' },
  { key:'grape',  em:'🍇', fruit:'#8822CC', pay:22, label:'Raisin' },
  { key:'mango',  em:'🥭', fruit:'#FF6600', pay:14, label:'Mangue' },
  { key:'pine',   em:'🍍', fruit:'#CCAA00', pay:18, label:'Ananas' },
];

let gameStarted = false;

// ── MESSAGE SYSTEM ──
const MSG_CHARS = {
  barista: { name:'👨‍🍳 Barista', em:'👨‍🍳', color:'#FFD060' },
  customer:{ name:'👤 Client',   em:'👤',    color:'#88DDFF' },
  guide:   { name:'🌟 Guide',    em:'🌟',    color:'#AAFFAA' },
  truck:   { name:'🚛 Camion',   em:'🚛',    color:'#FFAA44' },
  forest:  { name:'🌲 Forêt',   em:'🌲',    color:'#66FF88' },
};

let msgQueue = [];
let msgActive = false;
let msgTypingIdx = 0;
let msgTypingTick = 0;
let msgCurrent = null;
let msgAutoHideTimer = null;
let msgShownKeys = new Set(); // prevent repeat messages

function queueMsg(charKey, text, opts={}){
  const key = opts.key || (charKey+':'+text.slice(0,20));
  if(opts.once && msgShownKeys.has(key)) return;
  if(opts.once) msgShownKeys.add(key);
  msgQueue.push({ charKey, text, duration: opts.duration||3800, key });
  if(!msgActive) showNextMsg();
}

function showNextMsg(){
  if(!msgQueue.length){ hideMsg(); return; }
  msgCurrent = msgQueue.shift();
  msgActive = true;
  const ch = MSG_CHARS[msgCurrent.charKey] || MSG_CHARS.guide;
  document.getElementById('msg-avatar').textContent = ch.em;
  document.getElementById('msg-name').textContent = ch.name;
  document.getElementById('msg-name').style.color = ch.color;
  document.getElementById('msg-text').textContent = '';
  document.getElementById('msg-dots').style.display = 'flex';
  document.getElementById('msg-continue').style.display = 'none';
  document.getElementById('msg-box').className = 'msg-visible';
  msgTypingIdx = 0; msgTypingTick = 0;
  clearTimeout(msgAutoHideTimer);
}

function hideMsg(){
  msgActive = false; msgCurrent = null;
  document.getElementById('msg-box').className = 'msg-hidden';
  clearTimeout(msgAutoHideTimer);
}

function updateMsgSystem(){
  if(!msgActive || !msgCurrent) return;
  const txt = msgCurrent.text;
  msgTypingTick++;
  // Type one char every 1.5 ticks
  if(msgTypingIdx < txt.length && msgTypingTick % 2 === 0){
    msgTypingIdx++;
    document.getElementById('msg-text').textContent = txt.slice(0, msgTypingIdx);
  }
  if(msgTypingIdx >= txt.length){
    document.getElementById('msg-dots').style.display = 'none';
    if(msgQueue.length > 0){
      document.getElementById('msg-continue').style.display = 'block';
    }
    clearTimeout(msgAutoHideTimer);
    msgAutoHideTimer = setTimeout(()=>{ showNextMsg(); }, msgCurrent.duration);
  }
}

// ── GAME STATE TRACKING for contextual messages ──
let prevBasketLen = 0;
let prevHeldJuice = null;
let prevScene = 'main';
let prevCustomerCount = 0;
let prevBlending = false;
let msgCooldowns = {}; // key -> tick when last shown

function cooldown(key, frames){
  if((msgCooldowns[key]||0) > tick) return true;
  msgCooldowns[key] = tick + frames;
  return false;
}

function updateContextualMessages(){
  if(!gameStarted) return;

  const waitingCustomers = customers.filter(c=>c.status==='wait');
  const urgentCustomers  = customers.filter(c=>c.status==='wait' && c.timer/c.patience > 0.65);

  // ── New customer arrives ──
  if(customers.length > prevCustomerCount && customers.some(c=>c.status==='walk')){
    const c = customers[customers.length-1];
    const f = FRUITS.find(t=>t.key===c.want);
    if(!cooldown('cust_arrive', 300)){
      queueMsg('customer', `Bonjour ! Je voudrais un jus de ${f?f.label:'fruit'} ${f?f.em:'🍹'} s'il vous plaît !`, {key:'cust_arrive_'+tick});
    }
  }
  prevCustomerCount = customers.length;

  // ── No fruits, no juice, customers waiting ──
  if(scene==='main' && !basket.length && !heldJuice && !blending && waitingCustomers.length>0){
    if(!cooldown('no_fruit_remind', 600)){
      const f = FRUITS.find(t=>t.key===waitingCustomers[0].want);
      queueMsg('barista', `On a des clients qui attendent ! Il nous faut du ${f?f.label+' '+f.em:'fruit'} — monte dans le 🚛 camion et va à la forêt !`, {key:'no_fruit_'+tick, once:false});
    }
  }

  // ── Has fruits, not near bar ──
  if(scene==='main' && basket.length>0 && !heldJuice && !blending){
    const nearBar = dist(player,{x:bar.x+120,y:bar.y+220})<120;
    if(!nearBar && !cooldown('bring_to_bar', 500)){
      queueMsg('barista', `Tu as des fruits dans ton panier 🧺 — amène-les au blender ⚡ pour faire un jus !`, {key:'bring_bar', once:false});
    }
  }

  // ── Basket filled (came back from forest) ──
  if(basket.length > prevBasketLen && basket.length >= 3 && scene==='main'){
    if(!cooldown('basket_full', 400)){
      queueMsg('barista', `Parfait ! Tu as ${basket.length} fruits 🧺 — va au blender ⚡ et choisit un fruit à mixer !`, {key:'basket_ok_'+basket.length});
    }
  }
  prevBasketLen = basket.length;

  // ── Blending just started ──
  if(blending && !prevBlending){
    const f = FRUITS.find(t=>t.key===blendFruit);
    queueMsg('barista', `Voilà, on mixe le ${f?f.label:''} ${f?f.em:'🍊'} ! Ça va être délicieux ! ⚡`, {key:'blend_start_'+blendFruit});
  }
  prevBlending = blending;

  // ── Juice ready but no matching customer ──
  if(heldJuice && !prevHeldJuice){
    const match = customers.find(c=>c.status==='wait'&&c.want===heldJuice);
    const f = FRUITS.find(t=>t.key===heldJuice);
    if(match){
      queueMsg('barista', `Le jus de ${f?f.label:''} ${f?f.em:'🧃'} est prêt ! Un client l'attend — vas vite le servir !`, {key:'juice_ready_match'});
    } else {
      queueMsg('barista', `Le jus de ${f?f.label:''} ${f?f.em:'🧃'} est prêt ! Cherche le client qui en veut un...`, {key:'juice_ready_nomatch'});
    }
  }
  prevHeldJuice = heldJuice;

  // ── Customer patience getting low (urgent) ──
  if(urgentCustomers.length>0 && heldJuice && !cooldown('urgent_serve', 360)){
    const f = FRUITS.find(t=>t.key===urgentCustomers[0].want);
    queueMsg('customer', `Excusez-moi… je commence à perdre patience ! Mon jus de ${f?f.label:'fruit'} ${f?f.em:'🍹'}, s'il vous plaît ! 😤`, {key:'urgent_'+tick});
  }

  // ── Customer leaves without being served ──
  // (handled in updateMain on status change to 'leave')

  // ── Scene changes ──
  if(scene !== prevScene){
    if(scene==='journey' && prevScene==='main'){
      queueMsg('truck', `En route pour la forêt ! Maintiens ↑ ou W pour accélérer ! 🌲`, {key:'journey_start', once:true});
    }
    if(scene==='forest' && prevScene==='journey'){
      const allHarvested = FOREST_TREES.every(t=>t.harvested);
      if(allHarvested){
        queueMsg('forest', `Tous les arbres ont été cueillis ! Reviens dans quelques secondes pour qu'ils repoussent 🌱`, {key:'forest_empty', once:false});
      } else {
        queueMsg('forest', `Bienvenue dans la forêt ! Approche-toi d'un arbre 🌳 et appuie sur [E] pour cueillir des fruits !`, {key:'forest_enter', once:true});
      }
    }
    if(scene==='main' && prevScene==='forest'){
      if(basket.length>0){
        queueMsg('barista', `Bien joué ! Tu as rapporté ${basket.length} fruit${basket.length>1?'s':''} ! Viens au blender ⚡ les transformer en jus !`, {key:'back_from_forest', once:false});
      } else {
        queueMsg('barista', `Tu es revenu les mains vides ? 😅 Retourne à la forêt cueillir des fruits !`, {key:'back_empty', once:false});
      }
    }
    prevScene = scene;
  }

  // ── First customer ever ──
  if(customers.length===1 && customers[0].status==='walk' && !msgShownKeys.has('first_customer')){
    msgShownKeys.add('first_customer');
    setTimeout(()=>{
      queueMsg('barista', `Notre premier client arrive ! 🎉 Va vite à la forêt chercher des fruits si t'en as pas encore !`, {key:'fc'});
    }, 1200);
  }

  // ── Level up congrats ──
  // (handled in serve logic — we'll wire it below)
}

function closeAllPanels(){

function openFruitPicker(){
  // Build counts of fruits in basket
  const counts={};
  basket.forEach(k=>counts[k]=(counts[k]||0)+1);
  const available=FRUITS.filter(f=>counts[f.key]>0);
  if(!available.length)return;

  // If only one kind, skip picker and blend immediately
  if(available.length===1){
    startBlend(available[0].key);
    return;
  }

  closeAllPanels();
  pickerOpen=true;
  const container=document.getElementById('fp-options');
  container.innerHTML='';
  available.forEach(f=>{
    const btn=document.createElement('button');
    btn.className='fp-btn';
    btn.innerHTML=`<span class="fp-em">${f.em}</span><span class="fp-label">${f.label}</span><span class="fp-count">x${counts[f.key]}</span>`;
    btn.addEventListener('click',()=>{
      closeAllPanels();
      startBlend(f.key);
    });
    container.appendChild(btn);
  });
  document.getElementById('fruit-picker').classList.remove('hidden');
}

function startBlend(fruitKey){
  const idx=basket.indexOf(fruitKey);
  if(idx===-1)return;
  basket.splice(idx,1);
  blendFruit=fruitKey;
  blending=true;blendTick=0;
  const f=FRUITS.find(t=>t.key===fruitKey);
  notify('⚡ Mixage de '+(f?f.label:fruitKey)+'…');
  updateHUD();
}

function drawJourneyScene(){
  const sky=gx.createLinearGradient(0,0,0,H);
  sky.addColorStop(0,'#5CB8E8');sky.addColorStop(0.55,'#90D4F0');
  sky.addColorStop(0.68,'#B8E88A');sky.addColorStop(1,'#5EB840');
  gx.fillStyle=sky;gx.fillRect(0,0,W,H);
  gx.fillStyle='rgba(255,240,80,.18)';gx.beginPath();gx.arc(900,68,80,0,Math.PI*2);gx.fill();
  gx.fillStyle='#FFE044';gx.beginPath();gx.arc(900,68,44,0,Math.PI*2);gx.fill();
  const cx=journeyX*0.18;
  [[140,58,1.1],[360,44,.9],[600,52,1],[800,40,.8],[1100,55,1.0],[1350,42,.85]].forEach(([ox,cy2,s])=>{
    const x2=((ox-cx)%(W+300)+W+300)%(W+300)-150;
    gx.fillStyle='rgba(255,255,255,.92)';
    gx.beginPath();gx.arc(x2,cy2,40*s,0,Math.PI*2);gx.fill();
    gx.beginPath();gx.arc(x2-28*s,cy2+10,26*s,0,Math.PI*2);gx.fill();
    gx.beginPath();gx.arc(x2+28*s,cy2+10,24*s,0,Math.PI*2);gx.fill();
  });
  gx.fillStyle='#4EA828';gx.fillRect(0,ROAD_Y-8,W,H-ROAD_Y+8);
  gx.fillStyle='#AAA090';gx.fillRect(0,ROAD_Y,W,ROAD_H);
  gx.fillStyle='#C8B898';gx.fillRect(0,ROAD_Y,W,5);gx.fillRect(0,ROAD_Y+ROAD_H-5,W,5);
  const dashOff=journeyX%60;
  gx.fillStyle='rgba(255,255,255,.45)';
  for(let rx=-60;rx<W+60;rx+=60)gx.fillRect(rx-dashOff+5,ROAD_Y+ROAD_H/2-3,36,6);
  const fOff=journeyX%90;
  for(let fp=-90;fp<W+90;fp+=90){
    const fx=fp-fOff;
    gx.fillStyle='#AA8855';gx.fillRect(fx,ROAD_Y-28,8,28);
    gx.fillStyle='#CC9966';gx.fillRect(fx-2,ROAD_Y-36,12,12);
  }
  gx.strokeStyle='#886644';gx.lineWidth=2.5;gx.beginPath();
  for(let fp=-90;fp<W+90;fp+=90){const fx=fp-fOff;if(fp===-90)gx.moveTo(fx+4,ROAD_Y-24);else gx.lineTo(fx+4,ROAD_Y-24+Math.sin(fp*.07)*5);}
  gx.stroke();
  const progress=journeyX/JOURNEY_DIST;
  const treeOff=journeyX%180;
  const treeColors=['#2a7a18','#1e6a12','#258a1a','#1a5c10','#206018'];
  for(let tp=-180;tp<W+180;tp+=180){
    const tx=tp-treeOff;
    const ti=Math.floor((tp+journeyX)/180)%treeColors.length;
    const s=0.9+Math.sin(tp*0.05+journeyX*.001)*0.15;
    drawBigTreeAt(tx,320,s,treeColors[ti],'#145008','#AA4A08');
    if(progress>0.3){const tx2=tp-treeOff+90;drawBigTreeAt(tx2,290,s*0.8,'#1a5c10','#0e3a08','#884408');}
  }
  if(progress>0.5){
    const alpha=(progress-0.5)*0.7;
    const grad=gx.createLinearGradient(0,0,W*0.4,0);
    grad.addColorStop(0,`rgba(10,40,10,${alpha})`);
    grad.addColorStop(1,'rgba(10,40,10,0)');
    gx.fillStyle=grad;gx.fillRect(0,0,W*0.4,ROAD_Y);
  }
  gx.fillStyle='rgba(0,0,0,.5)';rr(W/2-150,H-52,300,18,6);gx.fill();
  const pct=Math.min(1,journeyX/JOURNEY_DIST);
  gx.fillStyle=`hsl(${120*pct},80%,45%)`;rr(W/2-150,H-52,300*pct,18,6);gx.fill();
  gx.fillStyle='#fff';gx.font='bold 11px Nunito';gx.textAlign='center';
  gx.fillText('🌳 Vers la forêt : '+(Math.floor(pct*100))+'%',W/2,H-39);
  gx.textAlign='left';
  drawTruckAt(W/2-65,ROAD_Y-10);
  gx.fillStyle='rgba(255,255,210,.9)';rr(W/2-80,ROAD_Y-55,160,22,7);gx.fill();
  gx.fillStyle='#443300';gx.font='bold 11px Nunito';gx.textAlign='center';
  gx.fillText('[E] Sortir du camion',W/2,ROAD_Y-39);gx.textAlign='left';
}

function drawBigTreeAt(x,y,s,c1,c2,trunk){
  gx.fillStyle=trunk;gx.fillRect(x-9*s,y-5,18*s,40*s);
  [[0,c2,1],[1,c1,.82],[2,c1,.65]].forEach(([l,col,f])=>{
    const sw=Math.sin(tick*.02+x)*.4;
    const lw=(3.5-l)*36*s*f;
    const ly=y-l*28*s+sw*3;
    gx.fillStyle=col;
    gx.beginPath();gx.moveTo(x+sw,ly-55*s*f);gx.lineTo(x+lw,ly);gx.lineTo(x-lw,ly);gx.closePath();gx.fill();
  });
}

function drawTruckAt(x,y){
  const dispFacing=-1;
  gx.fillStyle='rgba(0,0,0,.14)';
  gx.beginPath();gx.ellipse(x+65,y+66,72,11,0,0,Math.PI*2);gx.fill();
  gx.save();gx.translate(x+65,y+30);gx.scale(dispFacing,1);gx.translate(-65,-30);
  if(Math.abs(truck.speed)>0.2){
    for(let i=0;i<3;i++){gx.fillStyle=`rgba(200,180,130,${.28-i*.07})`;gx.beginPath();gx.ellipse(127+i*14,56,9-i*2,5,0,0,Math.PI*2);gx.fill();}
  }
  gx.fillStyle='#AA2800';rr(48,5,85,40,5);gx.fill();
  gx.fillStyle='#7A3A10';rr(50,7,81,10,3);gx.fill();
  gx.fillStyle='#CC3311';rr(0,0,52,50,9);gx.fill();
  gx.fillStyle='#BB2200';rr(0,0,22,50,9);gx.fill();
  gx.fillStyle='rgba(160,225,255,.85)';rr(5,6,32,20,5);gx.fill();
  gx.fillStyle='rgba(255,255,255,.28)';gx.beginPath();gx.moveTo(7,8);gx.lineTo(16,8);gx.lineTo(13,16);gx.lineTo(7,16);gx.fill();
  gx.fillStyle='rgba(255,205,130,.9)';gx.beginPath();gx.arc(18,12,7,0,Math.PI*2);gx.fill();
  gx.fillStyle='rgba(68,110,165,.85)';rr(12,17,14,12,3);gx.fill();
  if(basket.length>0){
    gx.fillStyle='#9B5A1A';rr(52,3,80,18,4);gx.fill();
    basket.slice(0,6).forEach((k,i)=>{const f=FRUITS.find(t=>t.key===k);gx.font='13px serif';gx.textAlign='center';gx.textBaseline='middle';gx.fillText(f?f.em:'🍊',58+i*13,12);});
    gx.textAlign='left';gx.textBaseline='alphabetic';
  }
  gx.fillStyle='rgba(190,190,190,.3)';gx.beginPath();gx.arc(127,3+Math.sin(tick*.1)*2,7,0,Math.PI*2);gx.fill();
  gx.beginPath();gx.arc(135,-8+Math.sin(tick*.1+1)*3,5,0,Math.PI*2);gx.fill();
  gx.fillStyle='rgba(0,0,0,.7)';rr(24,-28,82,16,5);gx.fill();
  gx.fillStyle='#44FF99';gx.font='bold 10px Nunito';gx.textAlign='center';
  gx.fillText('VIT:'+Math.abs(truck.speed).toFixed(1)+'/'+truck.maxSpeed,65,-18);gx.textAlign='left';
  const wr=tick*dispFacing*.075;
  [14,112].forEach(wx=>{
    gx.fillStyle='#1a1a1a';gx.beginPath();gx.arc(wx,54,14,0,Math.PI*2);gx.fill();
    gx.fillStyle='#444';gx.beginPath();gx.arc(wx,54,7,0,Math.PI*2);gx.fill();
    gx.save();gx.translate(wx,54);gx.rotate(wr);
    gx.strokeStyle='#888';gx.lineWidth=1.8;
    for(let i=0;i<4;i++){const a=i*Math.PI/2;gx.beginPath();gx.moveTo(0,0);gx.lineTo(Math.cos(a)*11,Math.sin(a)*11);gx.stroke();}
    gx.restore();
    gx.fillStyle='#AAA';gx.beginPath();gx.arc(wx,54,3,0,Math.PI*2);gx.fill();
  });
  gx.restore();
}

function drawSky(){
  // Rich blue sky gradient like the Stil Land image
  const sky=gx.createLinearGradient(0,0,0,H);

function drawForestTree(t){
  const s=t.s||1;
  const sway=Math.sin(tick*.022+t.sway)*4*s+(t.shake||0);
  if(t.shake>0)t.shake*=.85;
  const{x,y}=t;
  gx.fillStyle='#7A4A18';gx.fillRect(x-7*s,y,14*s,45*s);
  gx.fillStyle='#9B5A22';gx.fillRect(x-4*s,y,5*s,40*s);
  const colors=[['#1a5c10','#256a14'],['#2a7a1a','#348820'],['#22660e','#2e7a14']];
  for(let l=2;l>=0;l--){
    const lw=(3.5-l)*38*s;
    const ly=y-l*28*s+sway*(1-l*.2);
    gx.fillStyle=colors[l][0];gx.beginPath();gx.moveTo(x+sway*.4,ly-52*s);gx.lineTo(x+lw,ly);gx.lineTo(x-lw,ly);gx.closePath();gx.fill();
    gx.fillStyle=colors[l][1];gx.beginPath();gx.moveTo(x+sway*.4,ly-52*s);gx.lineTo(x+lw*.3,ly-12*s);gx.lineTo(x-lw*.3,ly-12*s);gx.closePath();gx.fill();
  }
  if(!t.harvested){
    for(let i=0;i<t.fruits;i++){
      const a=(i/t.fruits)*Math.PI*1.6-0.8;
      const fr=24*s+Math.sin(tick*.03+t.sway+i)*2.5;
      const fx=x+Math.cos(a)*fr+sway*.5;
      const fy=y-28*s+Math.sin(a)*fr*.5;
      gx.font=Math.round(14*s)+'px serif';gx.textAlign='center';gx.textBaseline='middle';gx.fillText(t.em,fx,fy);
    }
    gx.textAlign='left';gx.textBaseline='alphabetic';
  } else if(t.regrow>0){
    const rem=Math.max(0,(t.regrow-Date.now())/1000);
    gx.fillStyle='rgba(0,0,0,.7)';rr(x-20,y-22,40,15,5);gx.fill();
    gx.fillStyle='#FFE066';gx.font='bold 9px Nunito';gx.textAlign='center';
    gx.fillText('⏱'+Math.ceil(rem)+'s',x,y-10);gx.textAlign='left';
  }
  gx.fillStyle='rgba(0,0,0,.55)';rr(x-22,y+36*s,44,15,4);gx.fill();
  gx.fillStyle='#FFE066';gx.font='bold 9px Nunito';gx.textAlign='center';
  gx.fillText(t.em+' '+t.label,x,y+47*s);gx.textAlign='left';
}

function updateTip(){
  if(scene==='journey'){setTip('🚛 Maintiens ↑/W pour avancer ! '+Math.floor(journeyX/JOURNEY_DIST*100)+'% … [E] pour sortir');return;}
  if(scene==='forest'){
    if(basket.length===0)setTip('🌲 Marche vers un arbre et appuie sur [E] pour cueillir !');
    else setTip('🧺 Super ! Va au portail en bas pour retourner au bar !');
    return;
  }
  if(player.inTruck)setTip('🚛 Conduis à GAUCHE vers le portail forêt — [E] pour sortir du camion');
  else if(!basket.length&&!heldJuice)setTip('🚛 Monte dans le camion [E] → conduis vers le portail 🌳 à gauche !');
  else if(basket.length>0&&!heldJuice){
    if(dist(player,{x:bar.x+120,y:bar.y+220})<90)setTip('[E] Choisir un fruit à mixer au Bar à Jus !');
    else setTip('🏃 Ramène tes fruits au ⚡ Bar à Jus pour mixer !');
  }
  else if(blending)setTip('⚡ Mixage en cours…');
  else if(heldJuice){
    const f=FRUITS.find(t=>t.key===heldJuice);
    const match=customers.find(c=>c.status==='wait'&&c.want===heldJuice);
    if(match)setTip('🍹 Client repéré ! Approche-toi et appuie [E] pour servir ! (🗑️ pour jeter)');
    else setTip('🍹 Cherche le client qui veut du '+(f?f.label+' '+f.em:'jus')+' — [E] pour servir ! (🗑️ pour jeter)');
  }
  else setTip('Marche vers le 🚛 camion et appuie sur [E] pour monter !');
}

// ── FIX: key check helper ──
function keyPressed(k){
  return keys[k] || keys[k.toLowerCase()] || keys[k.toUpperCase()];
}
function consumeKey(k){
  keys[k]=false;keys[k.toLowerCase()]=false;keys[k.toUpperCase()]=false;
}

function updateMain(){
  if(blending){
    blendTick++;
    if(blendTick>=160){
      blending=false;heldJuice=blendFruit;blendFruit=null;
      const f=FRUITS.find(t=>t.key===heldJuice);
      notify('🧃 Jus de '+(f?f.label:heldJuice)+' prêt !');
      burst(bar.x+120,bar.y+150,'#FFD700');updateHUD();
    }
  }
  if(!player.inTruck){
    let dx=0,dy=0;
    if(keys['ArrowLeft']||keys['a'])dx=-1;
    if(keys['ArrowRight']||keys['d'])dx=1;
    if(keys['ArrowUp']||keys['w'])dy=-1;
    if(keys['ArrowDown']||keys['s'])dy=1;
    if(dx||dy){
      const len=Math.hypot(dx,dy);
      player.vx=dx/len*player.spd;player.vy=dy/len*player.spd;
      if(dx)player.facing=dx>0?1:-1;player.anim+=.16;
    } else {player.vx*=.72;player.vy*=.72;}
    player.x+=player.vx;player.y+=player.vy;
    player.x=Math.max(12,Math.min(W-12,player.x));
    player.y=Math.max(85,Math.min(H-32,player.y));

    if(keyPressed('e')){
      consumeKey('e');

      // Close picker if open
      if(pickerOpen){ closeAllPanels(); return; }

      // Enter truck
      if(dist(player,{x:truck.x+65,y:truck.y+30})<85){
        player.inTruck=true;
        return;
      }

      // Enter forest portal
      if(dist(player,{x:290,y:ROAD_Y+24})<70){
        switchScene('forest',()=>{fPlayer.x=512;fPlayer.y=460;});
        return;
      }

      // ── FIX: Serve customer — use larger radius (120) and check all waiting customers ──
      if(heldJuice){
        let served=false;
        for(let i=0;i<customers.length;i++){
          const c=customers[i];
          if(c.status==='wait' && dist(player,c)<120){
            if(c.want===heldJuice){
              const f=FRUITS.find(t=>t.key===c.want);
              const pay=f?f.pay:10;
              money+=pay;xp+=pay;
              if(xp>=level*50){level++;xp=0;notify('⭐ Niveau supérieur ! Tu es niveau '+level+' !');}
              floatAt(c.x,c.y-40,'+$'+pay,'#FFD700');
              burst(c.x,c.y-30,'#FFD700');
              heldJuice=null;c.status='happy';c.happyT=90;
              updateHUD();served=true;
              notify('🍹 Servi ! +$'+pay);
              break;
            } else {
              // Wrong juice - show feedback
              floatAt(c.x,c.y-40,'❌ Mauvais jus !','#FF4444');
              notify('❌ Ce client ne veut pas ce jus !');
              break;
            }
          }
        }
        if(!served){
          // Try blender anyway if near bar
          if(dist(player,{x:bar.x+120,y:bar.y+220})<95&&basket.length&&!blending){
            openFruitPicker();
          }
        }
        return;
      }

      // Use blender
      if(dist(player,{x:bar.x+120,y:bar.y+220})<95){
        if(basket.length&&!blending&&!heldJuice){
          openFruitPicker();
        }
        return;
      }
    }
  }

  if(player.inTruck){
    let accel=0;
    if(keys['ArrowUp']||keys['w'])accel=1;
    if(keys['ArrowDown']||keys['s'])accel=-.5;
    if(keys['ArrowLeft']||keys['a'])truck.facing=-1;
    if(keys['ArrowRight']||keys['d'])truck.facing=1;
    truck.speed+=accel*truck.acc;truck.speed*=truck.friction;
    truck.speed=Math.max(-truck.maxSpeed*.4,Math.min(truck.maxSpeed,truck.speed));
    truck.x+=truck.speed*truck.facing;truck.x=Math.max(-80,Math.min(W-80,truck.x));
    player.x=truck.x+65;player.y=truck.y+30;
    if(truck.x<230&&Math.abs(truck.speed)>0.1){
      scene='journey';journeyX=0;journeyActive=true;truck.speed=truck.maxSpeed*.7;
      notify('🚛 En route vers la forêt ! Maintiens ↑/W !');return;
    }
    if(keyPressed('e')){consumeKey('e');player.inTruck=false;truck.speed=0;}
  }

  custCD--;
  if(custCD<=0&&customers.length<5){customers.push(mkCust());custCD=200+Math.floor(Math.random()*120);}
  customers.forEach((c,i)=>{
    const qp=queuePos(i);
    if(c.status==='walk'){
      const dx2=qp.x-c.x,dy2=qp.y-c.y,d=Math.hypot(dx2,dy2);
      if(d>2){c.x+=dx2/d*c.spd*1.2;c.y+=dy2/d*c.spd;}
      else{c.x=qp.x;c.y=qp.y;c.status='wait';}
    }
    if(c.status==='wait'){c.timer+=1;if(c.timer>c.patience)c.status='leave';}
    if(c.status==='happy'){c.happyT--;if(c.happyT<=0)c.status='leave';}
    if(c.status==='leave')c.x+=c.spd*2.5;
    c.bob+=.12;
  });
  customers=customers.filter(c=>c.x<W+140);
}

function updateJourney(){
  let accel=0;
  if(keys['ArrowUp']||keys['w'])accel=1;
  if(keys['ArrowDown']||keys['s'])accel=-.3;
  truck.speed+=accel*truck.acc;truck.speed*=truck.friction;
  truck.speed=Math.max(0,Math.min(truck.maxSpeed,truck.speed));
  if(truck.speed>0.1)journeyX+=truck.speed;
  if(journeyX>=JOURNEY_DIST){
    journeyActive=false;
    switchScene('forest',()=>{fPlayer.x=512;fPlayer.y=460;player.inTruck=false;truck.speed=0;truck.x=380;});
    return;
  }
  if(keyPressed('e')){
    consumeKey('e');
    switchScene('main',()=>{player.inTruck=false;truck.speed=0;player.x=truck.x+65;player.y=ROAD_Y+30;});
  }
}

function updateForest(){
  FOREST_TREES.forEach(t=>{if(t.harvested&&t.regrow>0&&Date.now()>=t.regrow){t.harvested=false;t.regrow=0;}});
  let dx=0,dy=0;
  if(keys['ArrowLeft']||keys['a'])dx=-1;
  if(keys['ArrowRight']||keys['d'])dx=1;
  if(keys['ArrowUp']||keys['w'])dy=-1;
  if(keys['ArrowDown']||keys['s'])dy=1;
  if(dx||dy){
    const len=Math.hypot(dx,dy);
    fPlayer.vx=dx/len*player.spd;fPlayer.vy=dy/len*player.spd;
    if(dx)fPlayer.facing=dx>0?1:-1;fPlayer.anim+=.16;
  } else {fPlayer.vx*=.72;fPlayer.vy*=.72;}
  fPlayer.x+=fPlayer.vx;fPlayer.y+=fPlayer.vy;
  fPlayer.x=Math.max(14,Math.min(W-14,fPlayer.x));fPlayer.y=Math.max(80,Math.min(H-28,fPlayer.y));
  if(keyPressed('e')){
    consumeKey('e');
    const nearby=FOREST_TREES.find(t=>!t.harvested&&dist(fPlayer,{x:t.x,y:t.y+40})<72);
    if(nearby){
      for(let i=0;i<nearby.fruits;i++)basket.push(nearby.key);
      nearby.harvested=true;nearby.regrow=Date.now()+12000;nearby.shake=12;
      burst(nearby.x,nearby.y-20,nearby.fruit,10);
      floatAt(nearby.x,nearby.y-40,'+'+nearby.fruits+' '+nearby.em,nearby.fruit);
      notify('🧺 '+nearby.fruits+' '+nearby.label+' cueilli(s) !');updateHUD();return;
    }
    if(dist(fPlayer,{x:512,y:565})<90){switchScene('main',()=>{player.x=320;player.y=ROAD_Y+30;});}
  }
}

function update(){
  if(!gameStarted)return;
  tick++;
  if(scene==='main')updateMain();
  else if(scene==='journey')updateJourney();
  else if(scene==='forest')updateForest();
  particles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=.12;p.life-=.022;});
  particles=particles.filter(p=>p.life>0);
  updateTip();
}

function draw(){
  gx.clearRect(0,0,W,H);
  if(scene==='main'){
    drawSky();drawGround();drawForestSide();drawForestPortal();drawJuiceBar();
    customers.forEach((c,i)=>drawCustomer(c,i));drawTruck();drawPlayer();drawParticles();
  } else if(scene==='journey'){drawJourneyScene();drawParticles();}
  else if(scene==='forest'){drawForestScene();drawParticles();}
}

function loop(){update();draw();updateHUD();requestAnimationFrame(loop);}

function scaleGame(){
  const shell=document.getElementById('shell');
  const scaleX=window.innerWidth/1024;
  const scaleY=window.innerHeight/620;
  const scale=Math.min(scaleX,scaleY);
  const offsetX=(window.innerWidth-1024*scale)/2;
  const offsetY=(window.innerHeight-620*scale)/2;
  shell.style.transform=`translate(${offsetX}px,${offsetY}px) scale(${scale})`;
  
  // Scale splash screen
  const splash=document.getElementById('splash-screen');
  if(splash&&!splash.classList.contains('hidden')){
    const invScale=1/scale;
    splash.style.transformOrigin='top left';
    splash.style.width=(window.innerWidth*invScale)+'px';
    splash.style.height=(window.innerHeight*invScale)+'px';
    splash.style.left=(-offsetX*invScale)+'px';
    splash.style.top=(-offsetY*invScale)+'px';
  }

  const ws=document.getElementById('welcome-screen');
  if(ws&&!ws.classList.contains('hidden')){
    const invScale=1/scale;
    ws.style.transformOrigin='top left';
    ws.style.width=(window.innerWidth*invScale)+'px';
    ws.style.height=(window.innerHeight*invScale)+'px';
    ws.style.left=(-offsetX*invScale)+'px';
    ws.style.top=(-offsetY*invScale)+'px';
  }
}
window.addEventListener('resize',scaleGame);
scaleGame();
loop();
</script>
